<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>WebAR Geometri Ruang</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
      touch-action: none;
    }

    #ar-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      inset: 0;
      overflow: hidden;
      background: #000;
    }

    #loading {
      position: fixed;
      top: 14px;
      left: 14px;
      right: 14px;
      z-index: 30;
      color: white;
      background: rgba(0, 0, 0, 0.68);
      padding: 12px 14px;
      border-radius: 14px;
      text-align: center;
      font-size: 15px;
      line-height: 1.4;
      backdrop-filter: blur(6px);
    }

    #scan-guide {
      position: fixed;
      top: 48%;
      left: 50%;
      width: min(72vw, 330px);
      aspect-ratio: 1 / 1;
      transform: translate(-50%, -50%);
      z-index: 25;
      pointer-events: none;
      border: 3px solid rgba(255, 255, 255, 0.75);
      border-radius: 22px;
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.12);
    }

    #scan-guide::before,
    #scan-guide::after {
      content: "";
      position: absolute;
      width: 38px;
      height: 38px;
      border-color: #ffffff;
      border-style: solid;
    }

    #scan-guide::before {
      top: -4px;
      left: -4px;
      border-width: 5px 0 0 5px;
      border-radius: 18px 0 0 0;
    }

    #scan-guide::after {
      right: -4px;
      bottom: -4px;
      border-width: 0 5px 5px 0;
      border-radius: 0 0 18px 0;
    }

    #scan-text {
      position: absolute;
      left: 50%;
      bottom: -42px;
      transform: translateX(-50%);
      color: white;
      background: rgba(0, 0, 0, 0.65);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      white-space: nowrap;
    }

    #controls {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 14px;
      z-index: 40;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 12px;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 18px;
      padding: 12px;
      backdrop-filter: blur(8px);
    }

    .panel-title {
      color: white;
      font-size: 13px;
      text-align: center;
      margin-bottom: 9px;
      font-weight: bold;
      opacity: 0.95;
    }

    .dpad {
      display: grid;
      grid-template-columns: 58px 58px 58px;
      grid-template-rows: 58px 58px 58px;
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    .side-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 9px;
      min-width: 92px;
    }

    button {
      width: 100%;
      min-height: 54px;
      border: none;
      border-radius: 16px;
      background: white;
      color: black;
      font-size: 18px;
      font-weight: 800;
      box-shadow: 0 5px 14px rgba(0, 0, 0, 0.35);
      user-select: none;
      touch-action: manipulation;
    }

    button:active {
      transform: scale(0.94);
      background: #e9e9e9;
    }

    .dpad button {
      width: 58px;
      height: 58px;
      min-height: 58px;
      border-radius: 18px;
      font-size: 24px;
      padding: 0;
    }

    .empty {
      visibility: hidden;
    }

    #resetButton {
      font-size: 15px;
      min-height: 52px;
    }

    @media (max-width: 420px) {
      #controls {
        grid-template-columns: 1fr;
        justify-items: center;
        gap: 10px;
      }

      .panel {
        width: min(94vw, 360px);
      }

      .side-buttons {
        grid-template-columns: repeat(3, 1fr);
        min-width: 0;
      }

      .side-buttons button {
        font-size: 15px;
        min-height: 50px;
      }

      #loading {
        font-size: 14px;
      }

      #scan-guide {
        top: 42%;
        width: min(76vw, 310px);
      }
    }

    @media (max-height: 700px) {
      #scan-guide {
        top: 38%;
        width: min(58vw, 250px);
      }

      .dpad {
        grid-template-columns: 50px 50px 50px;
        grid-template-rows: 50px 50px 50px;
        gap: 7px;
      }

      .dpad button {
        width: 50px;
        height: 50px;
        min-height: 50px;
        font-size: 21px;
      }

      button {
        min-height: 48px;
      }
    }
  </style>
</head>

<body>
  <div id="ar-container"></div>

  <div id="loading">
    Memuat AR... Jika diminta, izinkan akses kamera.
  </div>

  <div id="scan-guide">
    <div id="scan-text">Arahkan marker ke tengah kotak</div>
  </div>

  <div id="controls">
    <div class="panel">
      <div class="panel-title">Geser Model</div>

      <div class="dpad">
        <button class="empty">.</button>
        <button id="moveUpButton">▲</button>
        <button class="empty">.</button>

        <button id="moveLeftButton">◀</button>
        <button id="resetButton">Reset</button>
        <button id="moveRightButton">▶</button>

        <button class="empty">.</button>
        <button id="moveDownButton">▼</button>
        <button class="empty">.</button>
      </div>
    </div>

    <div></div>

    <div class="panel">
      <div class="panel-title">Atur Model</div>

      <div class="side-buttons">
        <button id="rotateLeftButton">↺</button>
        <button id="rotateRightButton">↻</button>
        <button id="scaleUpButton">＋</button>
        <button id="scaleDownButton">－</button>
      </div>
    </div>
  </div>

  <script type="module">
    import * as THREE from "three";
    import { MindARThree } from "mindar-image-three";
    import { GLTFLoader } from "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const loadingText = document.querySelector("#loading");
    const scanGuide = document.querySelector("#scan-guide");

    const MODEL_START_SCALE = 1.5;
    const MOVE_STEP = 0.04;
    const ROTATE_STEP = 0.18;
    const SCALE_STEP = 0.12;

    let model;
    let currentScale = MODEL_START_SCALE;
    let markerHasBeenFound = false;

    const mindarThree = new MindARThree({
      container: document.querySelector("#ar-container"),
      imageTargetSrc: "./target.mind"
    });

    const { renderer, scene, camera } = mindarThree;

    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);

    const hemisphereLight = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.2);
    scene.add(hemisphereLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(0, 2, 1);
    scene.add(directionalLight);

    const anchor = mindarThree.addAnchor(0);

    const persistentGroup = new THREE.Group();
    persistentGroup.visible = false;
    scene.add(persistentGroup);

    anchor.onTargetFound = () => {
      markerHasBeenFound = true;
      persistentGroup.visible = true;

      scanGuide.style.display = "none";

      loadingText.innerText =
        "Marker terdeteksi. Model tetap tampil walaupun kamera bergeser.";
    };

    anchor.onTargetLost = () => {
      if (markerHasBeenFound) {
        persistentGroup.visible = true;

        loadingText.innerText =
          "Marker keluar kamera. Model tetap tampil di posisi terakhir.";
      }
    };

    const loader = new GLTFLoader();

    loader.load(
      "./model.glb",
      (gltf) => {
        model = gltf.scene;

        model.scale.set(currentScale, currentScale, currentScale);
        model.position.set(0, 0, 0);
        model.rotation.set(0, 0, 0);
        model.visible = true;

        persistentGroup.add(model);

        loadingText.innerText =
          "Model siap. Arahkan marker ke tengah kotak.";
      },
      undefined,
      (error) => {
        console.error(error);

        loadingText.innerText =
          "Gagal memuat model.glb. Cek nama file dan lokasi file.";
      }
    );

    function moveModel(dx, dy, dz = 0) {
      if (!model) return;

      model.position.x += dx;
      model.position.y += dy;
      model.position.z += dz;
    }

    function rotateModel(amount) {
      if (!model) return;

      model.rotation.y += amount;
    }

    function scaleModel(amount) {
      if (!model) return;

      currentScale += amount;

      if (currentScale < 0.1) {
        currentScale = 0.1;
      }

      if (currentScale > 8) {
        currentScale = 8;
      }

      model.scale.set(currentScale, currentScale, currentScale);
    }

    function resetModel() {
      if (!model) return;

      currentScale = MODEL_START_SCALE;

      model.position.set(0, 0, 0);
      model.rotation.set(0, 0, 0);
      model.scale.set(currentScale, currentScale, currentScale);

      loadingText.innerText =
        "Model di-reset. Arahkan marker jika ingin mengunci ulang posisi.";
    }

    function bindButton(buttonId, action) {
      const button = document.querySelector(buttonId);

      let intervalId = null;

      const start = (event) => {
        event.preventDefault();
        action();

        intervalId = setInterval(action, 90);
      };

      const stop = () => {
        if (intervalId) {
          clearInterval(intervalId);
          intervalId = null;
        }
      };

      button.addEventListener("pointerdown", start);
      button.addEventListener("pointerup", stop);
      button.addEventListener("pointerleave", stop);
      button.addEventListener("pointercancel", stop);
    }

    bindButton("#moveUpButton", () => moveModel(0, MOVE_STEP));
    bindButton("#moveDownButton", () => moveModel(0, -MOVE_STEP));
    bindButton("#moveLeftButton", () => moveModel(-MOVE_STEP, 0));
    bindButton("#moveRightButton", () => moveModel(MOVE_STEP, 0));

    bindButton("#rotateLeftButton", () => rotateModel(ROTATE_STEP));
    bindButton("#rotateRightButton", () => rotateModel(-ROTATE_STEP));

    bindButton("#scaleUpButton", () => scaleModel(SCALE_STEP));
    bindButton("#scaleDownButton", () => scaleModel(-SCALE_STEP));

    document.querySelector("#resetButton").addEventListener("click", resetModel);

    try {
      await mindarThree.start();

      loadingText.innerText =
        "Arahkan marker ke tengah kotak.";
    } catch (error) {
      console.error(error);

      loadingText.innerText =
        "Kamera gagal dibuka. Pastikan browser mengizinkan kamera dan halaman memakai HTTPS.";
    }

    renderer.setAnimationLoop(() => {
      if (markerHasBeenFound && anchor.group.visible) {
        anchor.group.updateMatrixWorld(true);

        const position = new THREE.Vector3();
        const quaternion = new THREE.Quaternion();
        const scale = new THREE.Vector3();

        anchor.group.matrixWorld.decompose(position, quaternion, scale);

        persistentGroup.position.copy(position);
        persistentGroup.quaternion.copy(quaternion);
        persistentGroup.scale.copy(scale);
      }

      renderer.render(scene, camera);
    });

    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
